version: '3.8'

networks:
  prod_net:
    driver: bridge

services:
  serving-api:
    container_name: serving-api
    build: ./serving
    volumes:
      - ./data:/data
      - ./artifacts:/artifacts
    ports:
      - "8080:8080"
    networks:
      - prod_net

  webapp:
    container_name: webapp
    build: ./webapp
    ports:
      - "8081:8081"
    networks:
      - prod_net
    depends_on:
      - serving-api
